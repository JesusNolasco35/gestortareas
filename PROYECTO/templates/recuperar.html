{% extends "base.html" %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-warning text-center">
                <h3 class="mb-0">Recuperar Contraseña</h3>
            </div>
            <div class="card-body">
                <p class="text-muted text-center">Te enviaremos un enlace para restablecer tu contraseña</p>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" placeholder="usuario@ejemplo.com">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Enviar enlace</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="/inicio">Volver a Iniciar Sesión</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
